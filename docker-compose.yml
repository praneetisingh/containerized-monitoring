version: '3.8'

services:
  user_service:
    build:
      context: ./user_service
    ports:
      - "5001:5001"
    volumes:
      - shared-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  order_service:
    build:
      context: ./order_service
    ports:
      - "5002:5002"
    volumes:
      - shared-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  monitor_api:
    build:
      context: ./monitor_api
    ports:
      - "8001:8000"
    volumes:
      - shared-logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    environment:
      - MONITOR_API_URL=http://localhost:8001
      - USER_SERVICE_URL=http://localhost:5001
      - ORDER_SERVICE_URL=http://localhost:5002
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  shared-logs:
