<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Containerized System Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="logo">
                    <span class="pulse"></span>
                    <h1>System Monitor</h1>
                </div>
                <div class="status-badge" id="api-status">Connecting...</div>
            </div>
        </header>

        <!-- Main Dashboard -->
        <main class="dashboard-grid">
            
            <!-- Metrics Summary Cards -->
            <section class="metrics-section">
                <div class="card metric-card info-metric">
                    <h3>INFO</h3>
                    <div class="metric-value" id="count-info">0</div>
                </div>
                <div class="card metric-card warning-metric">
                    <h3>WARNING</h3>
                    <div class="metric-value" id="count-warning">0</div>
                </div>
                <div class="card metric-card error-metric">
                    <h3>ERROR</h3>
                    <div class="metric-value" id="count-error">0</div>
                </div>
                <div class="card metric-card critical-metric">
                    <h3>CRITICAL</h3>
                    <div class="metric-value" id="count-critical">0</div>
                </div>
            </section>

            <!-- Control Panel -->
            <section class="controls-section">
                <div class="card controls-card">
                    <h2>Demo App Controls</h2>
                    <p>Trigger actions on the demo app to generate logs.</p>
                    <div class="btn-group">
                        <button class="btn btn-info" onclick="triggerEndpoint('/success')">Success</button>
                        <button class="btn btn-warning" onclick="triggerEndpoint('/slow')">Slow Request</button>
                        <button class="btn btn-error" onclick="triggerEndpoint('/error')">Error</button>
                        <button class="btn btn-random" onclick="triggerEndpoint('/random')">Random</button>
                    </div>
                    <div class="btn-group mt-3">
                        <button class="btn btn-secondary" onclick="triggerEndpoint('/load')">High Load</button>
                        <button class="btn btn-danger" onclick="triggerEndpoint('/crash')">Simulate Crash</button>
                    </div>
                </div>
            </section>

            <!-- Live Log Viewer -->
            <section class="logs-section">
                <div class="card logs-card">
                    <div class="logs-header">
                        <h2>Live Logs stream</h2>
                        <div class="log-filters">
                            <button class="filter-btn active" data-level="ALL">ALL</button>
                            <button class="filter-btn" data-level="ERROR">ERRORS</button>
                        </div>
                    </div>
                    <div class="log-terminal" id="log-terminal">
                        <!-- Logs injected here -->
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
