name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build and Start Containers
      run: docker-compose up --build -d

    - name: Wait for services to initialize
      run: sleep 5

    - name: Test Demo App (Inside Docker)
      run: docker-compose exec -T demo_app pytest test_app.py

    - name: Test Monitor API (Inside Docker)
      run: docker-compose exec -T monitor_api pytest test_api.py

    - name: Cleanup Containers
      if: always()
      run: docker-compose down
